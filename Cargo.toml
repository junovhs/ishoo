[package]
name = "linearis"
version = "0.1.0"
edition = "2021"
description = "A portable markdown-based issue tracker with a beautiful Dioxus desktop UI"

[dependencies]
dioxus = { version = "0.7", features = ["desktop"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
regex = "1"
tokio = { version = "1", features = ["time", "rt"] }

[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]
