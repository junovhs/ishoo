<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Smooth Reorder (Engine-grade, no release jitter)</title>
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                background: #0a0a0a;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                overflow-x: hidden;
                -webkit-user-select: none;
                user-select: none;
                overscroll-behavior: none;
            }

            .list {
                display: flex;
                flex-direction: column;
                gap: 24px;
                align-items: center;
                padding: 40px 16px;
                contain: layout style;
                isolation: isolate;
            }

            .item {
                width: 256px;
                height: 128px;
                touch-action: none;
                position: relative;
            }

            .item.dragging {
                z-index: 50;
            }
            .item.settling {
                z-index: 50;
            }

            .item-inner {
                width: 100%;
                height: 100%;
                border-radius: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: grab;
                position: relative;
                backface-visibility: hidden;
                -webkit-backface-visibility: hidden;
            }

            .item.dragging .item-inner {
                cursor: grabbing;
            }

            .item-inner::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;
                box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4);
                pointer-events: none;
            }

            .item-inner::after {
                content: "";
                position: absolute;
                inset: -16px;
                border-radius: 40px;
                opacity: 0;
                filter: blur(32px);
                transition: opacity 0.3s ease;
                pointer-events: none;
                will-change: opacity;
            }

            .item:hover .item-inner::after,
            .item.dragging .item-inner::after {
                opacity: 1;
            }

            .c0 .item-inner {
                background: #f43f5e;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            }
            .c0 .item-inner::after {
                background: rgba(244, 63, 94, 0.4);
            }
            .c0.dragging .item-inner {
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            }

            .c1 .item-inner {
                background: #3b82f6;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            }
            .c1 .item-inner::after {
                background: rgba(59, 130, 246, 0.4);
            }
            .c1.dragging .item-inner {
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            }

            .c2 .item-inner {
                background: #10b981;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            }
            .c2 .item-inner::after {
                background: rgba(16, 185, 129, 0.4);
            }
            .c2.dragging .item-inner {
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            }

            .c3 .item-inner {
                background: #f59e0b;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            }
            .c3 .item-inner::after {
                background: rgba(245, 158, 11, 0.4);
            }
            .c3.dragging .item-inner {
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            }

            .c4 .item-inner {
                background: #8b5cf6;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            }
            .c4 .item-inner::after {
                background: rgba(139, 92, 246, 0.4);
            }
            .c4.dragging .item-inner {
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            }

            .item-label {
                position: relative;
                color: white;
                font-size: 48px;
                font-weight: 700;
                pointer-events: none;
                filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            }

            @media (max-width: 640px) {
                .list {
                    gap: 16px;
                }
                .item {
                    width: 192px;
                    height: 96px;
                }
                .item-inner,
                .item-inner::before {
                    border-radius: 16px;
                }
                .item-label {
                    font-size: 36px;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .item-inner::after {
                    transition: none;
                }
            }
        </style>
    </head>

    <body>
        <div class="list" id="list">
            <div class="item c0">
                <div class="item-inner"><span class="item-label">1</span></div>
            </div>
            <div class="item c1">
                <div class="item-inner"><span class="item-label">2</span></div>
            </div>
            <div class="item c2">
                <div class="item-inner"><span class="item-label">3</span></div>
            </div>
            <div class="item c3">
                <div class="item-inner"><span class="item-label">4</span></div>
            </div>
            <div class="item c4">
                <div class="item-inner"><span class="item-label">5</span></div>
            </div>
        </div>

        <script>
            (function () {
                "use strict";

                var list = document.getElementById("list");

                // ─────────────────────────────────────────────────────────────────────
                // Layer management
                // ─────────────────────────────────────────────────────────────────────
                function promote(el) {
                    el.style.willChange = "transform";
                }
                function demote(el) {
                    el.style.willChange = "auto";
                }

                // Cache inners (avoid querySelector in rAF)
                var innerCache = new Map();
                function innerOf(el) {
                    var inner = innerCache.get(el);
                    if (!inner) {
                        inner = el.querySelector(".item-inner");
                        innerCache.set(el, inner);
                    }
                    return inner;
                }

                function promoteInner(el) {
                    innerOf(el).style.willChange = "transform";
                }
                function demoteInner(el) {
                    var i = innerOf(el);
                    i.style.willChange = "auto";
                    i.style.transform = "";
                }

                // ─────────────────────────────────────────────────────────────────────
                // Spring (fixed sub-step integration)
                // ─────────────────────────────────────────────────────────────────────
                var FIXED_DT = 1 / 120;
                var MAX_DT = 1 / 30;

                function Spring(k, c, m, init) {
                    this.k = k || 300;
                    this.c = c || 25;
                    this.m = m || 1;
                    this.pos = init != null ? init : 0;
                    this.tgt = init != null ? init : 0;
                    this.vel = 0;
                }

                Spring.prototype.step = function (dt) {
                    dt = Math.min(dt, MAX_DT);
                    var rem = dt;
                    while (rem > 1e-6) {
                        var h = rem < FIXED_DT ? rem : FIXED_DT;
                        var x = this.pos - this.tgt;
                        var acc = (-this.k * x - this.c * this.vel) / this.m;
                        this.vel += acc * h;
                        this.pos += this.vel * h;
                        rem -= h;
                    }
                };

                Spring.prototype.done = function (thr) {
                    thr = thr || 0.5;
                    return (
                        Math.abs(this.pos - this.tgt) < thr &&
                        Math.abs(this.vel) < thr
                    );
                };

                Spring.prototype.set = function (v) {
                    this.pos = v;
                    this.tgt = v;
                    this.vel = 0;
                };

                // ─────────────────────────────────────────────────────────────────────
                // State
                // ─────────────────────────────────────────────────────────────────────
                var items = Array.from(list.children);

                var dragged = null;
                var settleEl = null;
                var isDragging = false;
                var settling = false;

                // Raw pointer (OS rate) + prediction
                var rawX = 0,
                    rawY = 0;
                var predX = 0,
                    predY = 0,
                    hasPred = false;

                // Velocity-based prediction fallback
                var lastPX = 0,
                    lastPY = 0,
                    lastPT = 0;
                var vx = 0,
                    vy = 0;
                var LEAD_SEC = 1 / 60;
                var VEL_SMOOTH = 0.35;

                // Drag bookkeeping
                var startX = 0,
                    startY = 0;
                var origIdx = -1,
                    curIdx = -1;

                // Uniform slot geometry (captured once at drag start)
                var natTops = [];
                var itemH = 0,
                    gap = 0,
                    slotSize = 0;
                var baseTop = 0;

                // Springs
                var itemSprings = new Map();
                function springFor(el) {
                    var s = itemSprings.get(el);
                    if (!s) {
                        s = new Spring(900, 45);
                        itemSprings.set(el, s);
                    }
                    return s;
                }

                var scaleSpring = new Spring(650, 28, 1, 1);
                var xReturn = new Spring(420, 34);
                var yReturn = new Spring(560, 40);

                // RAF
                var raf = null;
                var lastT = 0;

                function currentGap() {
                    return window.innerWidth <= 640 ? 16 : 24;
                }

                function startLoop() {
                    if (!raf) {
                        lastT = performance.now();
                        raf = requestAnimationFrame(loop);
                    }
                }

                function captureTops(els) {
                    var out = new Array(els.length);
                    for (var i = 0; i < els.length; i++)
                        out[i] = els[i].getBoundingClientRect().top;
                    return out;
                }

                function computeSlotIndex(dy) {
                    var center = natTops[origIdx] + itemH * 0.5 + dy;
                    var f = (center - (baseTop + itemH * 0.5)) / slotSize;
                    var idx = Math.round(f);
                    if (idx < 0) idx = 0;
                    if (idx > natTops.length - 1) idx = natTops.length - 1;
                    return idx;
                }

                // ─────────────────────────────────────────────────────────────────────
                // Input: pointerrawupdate (OS-rate), predicted events, velocity fallback
                // ─────────────────────────────────────────────────────────────────────
                function onRawUpdate(e) {
                    if (!isDragging) return;

                    var src = e;
                    if (e.getCoalescedEvents) {
                        var co = e.getCoalescedEvents();
                        if (co && co.length) src = co[co.length - 1];
                    }

                    rawX = src.clientX;
                    rawY = src.clientY;

                    var t =
                        src.timeStamp != null
                            ? src.timeStamp
                            : performance.now();
                    if (lastPT) {
                        var dt = Math.max(0.001, (t - lastPT) / 1000);
                        var instVx = (rawX - lastPX) / dt;
                        var instVy = (rawY - lastPY) / dt;
                        vx = vx + (instVx - vx) * VEL_SMOOTH;
                        vy = vy + (instVy - vy) * VEL_SMOOTH;
                    }
                    lastPX = rawX;
                    lastPY = rawY;
                    lastPT = t;

                    if (e.getPredictedEvents) {
                        var pe = e.getPredictedEvents();
                        if (pe && pe.length) {
                            var p = pe[pe.length - 1];
                            predX = p.clientX;
                            predY = p.clientY;
                            hasPred = true;
                            return;
                        }
                    }
                    hasPred = false;
                }

                function onMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    rawX = e.clientX;
                    rawY = e.clientY;
                }

                // ─────────────────────────────────────────────────────────────────────
                // Pointer down
                // ─────────────────────────────────────────────────────────────────────
                function onDown(e) {
                    var item = e.target.closest(".item");
                    if (!item || isDragging) return;

                    e.preventDefault();
                    item.setPointerCapture(e.pointerId);

                    if (settleEl) {
                        settleEl.classList.remove("settling");
                        demote(settleEl);
                        demoteInner(settleEl);
                        settleEl.style.transform = "";
                        settleEl = null;
                        settling = false;
                    }

                    items = Array.from(list.children);

                    dragged = item;
                    isDragging = true;
                    origIdx = items.indexOf(item);
                    curIdx = origIdx;

                    // Batched layout reads (single block)
                    gap = currentGap();
                    itemH = item.offsetHeight;
                    slotSize = itemH + gap;
                    natTops = captureTops(items);
                    baseTop = natTops[0];

                    startX = e.clientX;
                    startY = e.clientY;
                    rawX = startX;
                    rawY = startY;
                    predX = startX;
                    predY = startY;
                    hasPred = false;

                    // Reset velocity predictor
                    lastPX = rawX;
                    lastPY = rawY;
                    lastPT =
                        e.timeStamp != null ? e.timeStamp : performance.now();
                    vx = 0;
                    vy = 0;

                    // Reset springs
                    scaleSpring.set(1);
                    scaleSpring.tgt = 1.085;
                    xReturn.set(0);
                    yReturn.set(0);
                    for (var i = 0; i < items.length; i++)
                        springFor(items[i]).set(0);

                    // Promote layers
                    for (var j = 0; j < items.length; j++) promote(items[j]);
                    promoteInner(dragged);

                    dragged.classList.add("dragging");
                    startLoop();
                }

                // ─────────────────────────────────────────────────────────────────────
                // Pointer up
                //
                // Release jitter fix:
                // FLIP using *actual rendered rects* (which include transforms),
                // then clear transforms, reorder DOM, measure clean layout, and
                // apply inverted deltas *in the same task* (no intermediate paint).
                // This removes 1-frame discontinuities / pops.
                // ─────────────────────────────────────────────────────────────────────
                function onUp() {
                    if (!isDragging || !dragged) return;

                    // Ensure we use the latest DOM order pre-reorder
                    items = Array.from(list.children);

                    // 1) BEFORE: measure rendered tops (includes current transforms)
                    var beforeTop = new Map();
                    for (var i = 0; i < items.length; i++) {
                        beforeTop.set(
                            items[i],
                            items[i].getBoundingClientRect().top,
                        );
                    }

                    // Keep these for x-return
                    var dxRelease = (rawX - startX) * 0.6;

                    // 2) Clear transforms so AFTER layout is clean (no transformed layout coupling)
                    for (var k = 0; k < items.length; k++) {
                        items[k].style.transform = "";
                    }
                    // Also clear dragged inner transform so rects are purely layout-based
                    innerOf(dragged).style.transform = "";

                    // Force a clean layout state for the next measurements.
                    // (No paint happens here; we're still in the same pointerup task.)
                    void list.offsetHeight;

                    // 3) Reorder DOM
                    if (curIdx !== origIdx) {
                        dragged.remove();
                        var rem = Array.from(list.children);
                        if (curIdx >= rem.length) list.appendChild(dragged);
                        else list.insertBefore(dragged, rem[curIdx]);
                    }

                    // Rebuild items after DOM update
                    items = Array.from(list.children);

                    // 4) AFTER: measure layout tops (no transforms)
                    var afterTop = new Map();
                    for (var j = 0; j < items.length; j++) {
                        afterTop.set(
                            items[j],
                            items[j].getBoundingClientRect().top,
                        );
                    }

                    // 5) Initialize springs from true inverted deltas (FLIP)
                    // Non-dragged items
                    for (var a = 0; a < items.length; a++) {
                        var el = items[a];
                        if (el === dragged) continue;

                        var delta =
                            (beforeTop.get(el) || 0) - (afterTop.get(el) || 0);
                        var s = springFor(el);
                        s.pos = delta;
                        s.tgt = 0;

                        if (Math.abs(delta) > 0.5) {
                            el.style.transform =
                                "translate3d(0," + delta + "px,0)";
                            promote(el);
                        } else {
                            el.style.transform = "";
                        }
                    }

                    // Dragged element: same FLIP delta, plus x/scale return springs
                    var dDelta =
                        (beforeTop.get(dragged) || 0) -
                        (afterTop.get(dragged) || 0);
                    yReturn.pos = dDelta;
                    yReturn.tgt = 0;
                    yReturn.vel = 0;

                    xReturn.pos = dxRelease;
                    xReturn.tgt = 0;
                    xReturn.vel = 0;

                    scaleSpring.tgt = 1;

                    // Apply initial settling transforms (no visual pop on release)
                    dragged.style.transform =
                        "translate3d(0," + yReturn.pos + "px,0)";
                    innerOf(dragged).style.transform =
                        "translate3d(" +
                        xReturn.pos +
                        "px,0,0) scale3d(" +
                        scaleSpring.pos +
                        "," +
                        scaleSpring.pos +
                        ",1)";

                    // Transition to settling
                    isDragging = false;
                    hasPred = false;
                    settling = true;
                    settleEl = dragged;

                    dragged.classList.remove("dragging");
                    dragged.classList.add("settling");
                    dragged = null;

                    startLoop();
                }

                // ─────────────────────────────────────────────────────────────────────
                // RAF loop (zero layout reads)
                // ─────────────────────────────────────────────────────────────────────
                function loop(now) {
                    var dt = Math.min((now - lastT) / 1000, MAX_DT);
                    lastT = now;

                    var active = false;

                    // DRAGGING
                    if (isDragging && dragged) {
                        active = true;

                        scaleSpring.step(dt);

                        var useX = rawX,
                            useY = rawY;
                        if (hasPred) {
                            useX = predX;
                            useY = predY;
                        } else {
                            useX = rawX + vx * LEAD_SEC;
                            useY = rawY + vy * LEAD_SEC;
                        }

                        var dy = useY - startY;
                        var dx = (useX - startX) * 0.6;

                        dragged.style.transform =
                            "translate3d(0," + dy + "px,0)";
                        innerOf(dragged).style.transform =
                            "translate3d(" +
                            dx +
                            "px,0,0) scale3d(" +
                            scaleSpring.pos +
                            "," +
                            scaleSpring.pos +
                            ",1)";

                        curIdx = computeSlotIndex(dy);

                        for (var i = 0; i < items.length; i++) {
                            var el = items[i];
                            if (el === dragged) continue;

                            var s = springFor(el);
                            var shift = 0;

                            if (origIdx < curIdx && i > origIdx && i <= curIdx)
                                shift = -slotSize;
                            else if (
                                origIdx > curIdx &&
                                i >= curIdx &&
                                i < origIdx
                            )
                                shift = slotSize;

                            s.tgt = shift;
                            s.step(dt);
                            el.style.transform =
                                "translate3d(0," + s.pos + "px,0)";
                        }
                    }

                    // SETTLING
                    if (settling) {
                        yReturn.step(dt);
                        xReturn.step(dt);
                        scaleSpring.step(dt);

                        if (settleEl) {
                            settleEl.style.transform =
                                "translate3d(0," + yReturn.pos + "px,0)";
                            innerOf(settleEl).style.transform =
                                "translate3d(" +
                                xReturn.pos +
                                "px,0,0) scale3d(" +
                                scaleSpring.pos +
                                "," +
                                scaleSpring.pos +
                                ",1)";

                            if (
                                yReturn.done(0.25) &&
                                xReturn.done(0.25) &&
                                scaleSpring.done(0.002)
                            ) {
                                settleEl.classList.remove("settling");
                                settleEl.style.transform = "";
                                demote(settleEl);
                                demoteInner(settleEl);
                                settleEl = null;
                            } else {
                                active = true;
                            }
                        }

                        var allDone = true;
                        for (var j = 0; j < items.length; j++) {
                            var el2 = items[j];
                            if (el2 === settleEl) continue;

                            var s2 = itemSprings.get(el2);
                            if (!s2) continue;

                            s2.step(dt);
                            if (!s2.done(0.25)) {
                                el2.style.transform =
                                    "translate3d(0," + s2.pos + "px,0)";
                                allDone = false;
                            } else {
                                el2.style.transform = "";
                                demote(el2);
                            }
                        }

                        if (allDone && !settleEl) settling = false;
                        if (!allDone) active = true;
                    }

                    raf = active ? requestAnimationFrame(loop) : null;
                }

                // ─────────────────────────────────────────────────────────────────────
                // Events
                // ─────────────────────────────────────────────────────────────────────
                list.addEventListener("pointerdown", onDown);
                window.addEventListener("pointerrawupdate", onRawUpdate, {
                    passive: true,
                });
                window.addEventListener("pointermove", onMove, {
                    passive: false,
                });
                window.addEventListener("pointerup", onUp);
                window.addEventListener("pointercancel", onUp);

                list.addEventListener("contextmenu", function (e) {
                    e.preventDefault();
                });
                list.addEventListener(
                    "touchmove",
                    function (e) {
                        if (isDragging) e.preventDefault();
                    },
                    { passive: false },
                );

                // ─────────────────────────────────────────────────────────────────────
                // Entrance animation
                // ─────────────────────────────────────────────────────────────────────
                items.forEach(function (el) {
                    el.style.opacity = "0";
                    el.style.transform =
                        "translate3d(0,50px,0) scale3d(0.8,0.8,1)";
                });

                requestAnimationFrame(function () {
                    requestAnimationFrame(function () {
                        items.forEach(function (el, i) {
                            el.style.transition =
                                "opacity 0.5s cubic-bezier(0.22,1,0.36,1) " +
                                i * 0.06 +
                                "s, " +
                                "transform 0.5s cubic-bezier(0.22,1,0.36,1) " +
                                i * 0.06 +
                                "s";
                            el.style.opacity = "1";
                            el.style.transform = "";
                        });

                        setTimeout(function () {
                            items.forEach(function (el) {
                                el.style.transition = "";
                                el.style.opacity = "";
                                el.style.transform = "";
                            });
                        }, 800);
                    });
                });
            })();
        </script>
    </body>
</html>
